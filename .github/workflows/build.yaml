name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - "release/**"
  workflow_dispatch:

jobs:
  py-ruff:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: &python-versions ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Lint with Ruff
        uses: chartboost/ruff-action@v1
      - name: Format with Ruff
        uses: chartboost/ruff-action@v1
        with:
          args: "format --check"

  py-mypy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: *python-versions
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}-${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Track inspect_ai main everywhere EXCEPT the release PR, where we
          # validate against the pinned/shipped version pulled in via .[dev] below.
          if [ "${{ github.head_ref }}" != "release-please--branches--main" ]; then
            python -m pip install git+https://github.com/UKGovernmentBEIS/inspect_ai.git
          fi
          python -m pip install .[dev]
      - name: Run mypy
        run: |
          mypy src examples tests --python-executable $(which python)

  py-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: *python-versions
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}-${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Track inspect_ai main everywhere EXCEPT the release PR, where we
          # validate against the pinned/shipped version pulled in via .[dev] below.
          if [ "${{ github.head_ref }}" != "release-please--branches--main" ]; then
            python -m pip install git+https://github.com/UKGovernmentBEIS/inspect_ai.git
          fi
          python -m pip install .[dev]
      - name: Run tests
        run: pytest

  py-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: *python-versions
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # Track inspect_ai main everywhere EXCEPT the release PR, where we
          # validate against the pinned/shipped version pulled in via . below.
          if [ "${{ github.head_ref }}" != "release-please--branches--main" ]; then
            python -m pip install git+https://github.com/UKGovernmentBEIS/inspect_ai.git
          fi
          python -m pip install build
      - name: Build package
        run: python -m build
      - name: Verify package
        run: |
          python -m pip install dist/*.whl
          python -c "import inspect_scout; print('Package imported successfully')"

  check-schema-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # This job checks that the committed schema/type artifacts are in sync
          # with the Python source — a regeneration-hygiene check, NOT a
          # shipped-compatibility gate. The committed artifacts are generated
          # against inspect_ai main, so this must always run against main; using
          # the pinned/shipped version on the release PR would flag false drift
          # for inspect_ai fields not yet released. (Shipped-version compatibility
          # is covered by py-test / py-build / py-mypy.)
          python -m pip install git+https://github.com/UKGovernmentBEIS/inspect_ai.git
          python -m pip install .

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: src/inspect_scout/_view/ts-mono/package.json
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/inspect_scout/_view/ts-mono/pnpm-lock.yaml
      - name: Install JS dependencies
        working-directory: src/inspect_scout/_view/ts-mono
        run: pnpm install --frozen-lockfile

      # The pipeline is Python → openapi.json → generated.ts. The two arrows
      # are checked independently: json → ts must match exactly, while
      # Python → json tolerates docstring-only ("description") drift so that
      # doc changes don't require regenerating checked-in artifacts. As a
      # result, description text in the committed artifacts can lag the Python
      # docstrings until the next structural change forces a regeneration.

      - name: Check generated types are in sync with checked-in schema
        working-directory: src/inspect_scout/_view/ts-mono
        run: |
          pnpm --filter scout types:generate
          if ! git diff --exit-code -- apps/scout/src/types/generated.ts
          then
            echo "❌ generated.ts is out of sync with the committed openapi.json."
            echo "Regenerate both artifacts and commit them:"
            echo "  .venv/bin/python scripts/export_openapi_schema.py"
            exit 1
          fi

      - name: Regenerate schema from Python source
        run: python scripts/export_openapi_schema.py

      - name: Check schema is up to date (docstring-only drift tolerated)
        run: python .github/scripts/check_openapi_drift.py

      - name: Ensure regeneration produced no other changes
        run: |
          if git status --porcelain \
              | grep -vE 'src/inspect_scout/_view/(openapi\.json|ts-mono)$' \
              | grep -q . \
            || git -C src/inspect_scout/_view/ts-mono status --porcelain \
              | grep -v 'apps/scout/src/types/generated\.ts$' \
              | grep -q .
          then
            echo "❌ Unexpected changes after regeneration:"
            git status
            git diff -- . ':!src/inspect_scout/_view/openapi.json'
            git -C src/inspect_scout/_view/ts-mono status
            git -C src/inspect_scout/_view/ts-mono diff -- . ':!apps/scout/src/types/generated.ts'
            exit 1
          fi

  submodule-on-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify submodule commit is on ts-mono main
        run: |
          SUBMODULE_SHA=$(git ls-tree HEAD src/inspect_scout/_view/ts-mono | awk '{print $3}')
          echo "Submodule points to: $SUBMODULE_SHA"

          git fetch https://github.com/meridianlabs-ai/ts-mono.git main
          MAIN_SHA=$(git rev-parse FETCH_HEAD)
          echo "ts-mono main is at: $MAIN_SHA"

          if git merge-base --is-ancestor "$SUBMODULE_SHA" "$MAIN_SHA"; then
            echo "✓ Submodule commit is on ts-mono main"
          else
            echo "✗ Submodule commit $SUBMODULE_SHA is not on ts-mono main."
            echo "  Merge the submodule PR first, then update the pointer (see docs/submodule-guide.md step 6)."
            exit 1
          fi

  js-dist-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: src/inspect_scout/_view/ts-mono/package.json

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/inspect_scout/_view/ts-mono/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: src/inspect_scout/_view/ts-mono
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: src/inspect_scout/_view/ts-mono
        run: pnpm build

      - name: Check dist is up-to-date
        run: |
          if ! git diff --exit-code src/inspect_scout/_view/dist
          then
            echo "❌ dist/ is out of sync with the frontend source!"
            echo ""
            echo "The build output has changed. Run:"
            echo "  cd src/inspect_scout/_view/ts-mono"
            echo "  pnpm build"
            echo ""
            echo "Then commit the updated dist/ directory."
            exit 1
          fi
