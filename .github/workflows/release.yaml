name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target-branch:
        description: "Maintenance branch to release from (e.g. hotfix/1.4.x). Leave as main for a normal release."
        type: string
        default: main

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
    uses: meridianlabs-ai/actions/.github/workflows/release-please-python.yml@v1
    with:
      # Both publishes (PyPI + the npm viewer lib) run in separate `on: release`
      # workflows, each with its own environment gate — so each posts its own
      # approval ping from there (deep-linking to the paused run), not here.
      approval-ping: false
      target-branch: ${{ inputs.target-branch }}
    secrets: inherit
